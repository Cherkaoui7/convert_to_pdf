<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Office → PDF Converter</title>
<style>
  :root {
    --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --accent-hover: #2563eb;
    --text: #e2e8f0; --muted: #94a3b8; --border: #334155; --success: #10b981; --error: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: var(--text); min-height: 100vh;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .container { width: 100%; max-width: 640px; }
  .header { text-align: center; margin-bottom: 32px; }
  .header h1 {
    font-size: 2rem; font-weight: 700;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .header p { color: var(--muted); font-size: 0.95rem; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 12px; padding: 48px 24px;
    text-align: center; transition: all 0.25s ease; cursor: pointer;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent); background: rgba(59, 130, 246, 0.08);
  }
  .drop-zone .icon { font-size: 3rem; margin-bottom: 12px; }
  .drop-zone p { color: var(--muted); margin-top: 8px; }
  .drop-zone strong { color: var(--text); }
  
  .options-panel {
    margin-top: 24px; padding: 16px; background: rgba(15, 23, 42, 0.5);
    border: 1px solid var(--border); border-radius: 12px;
  }
  .option-row {
    display: flex; align-items: center; margin-bottom: 12px;
  }
  .option-row:last-child { margin-bottom: 0; }
  .option-row label { margin-left: 10px; cursor: pointer; font-size: 0.9rem; }
  .option-row input[type="text"] {
    margin-left: auto; background: #0f172a; border: 1px solid var(--border);
    color: var(--text); padding: 6px 12px; border-radius: 6px; width: 180px;
    display: none;
  }
  .option-row input[type="text"].show { display: block; }

  .file-list { margin-top: 20px; }
  .file-item {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(15, 23, 42, 0.5); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; font-size: 0.9rem;
  }
  .file-item .name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .file-item .badge {
    padding: 2px 10px; border-radius: 999px; font-size: 0.75rem;
    font-weight: 600; margin-left: 12px;
  }
  .badge.pending { background: rgba(148,163,184,0.15); color: var(--muted); }
  .badge.ok { background: rgba(16,185,129,0.15); color: var(--success); }
  .badge.error { background: rgba(239,68,68,0.15); color: var(--error); }
  
  .btn {
    width: 100%; background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 14px; font-size: 1rem; font-weight: 600;
    cursor: pointer; transition: background 0.2s; margin-top: 20px;
  }
  .btn:hover:not(:disabled) { background: var(--accent-hover); }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }
  
  .supported { margin-top: 16px; font-size: 0.8rem; color: var(--muted); text-align: center; }
  .status { margin-top: 16px; text-align: center; font-size: 0.9rem; color: var(--muted); }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3); border-top-color: white;
    border-radius: 50%; animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  input[type="file"] { display: none; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Office → PDF Converter</h1>
    <p>Convert, Merge & Watermark DOC, PPT, XLS, TXT, Images to PDF</p>
  </div>
  <div class="card">
    <form id="form">
      <div class="drop-zone" id="dropZone">
        <div class="icon">📄</div>
        <p><strong>Click to browse</strong> or drag &amp; drop files here</p>
        <p>Multiple files supported · Max 100 MB each</p>
      </div>
      <input type="file" id="fileInput" name="files" multiple
             accept=".doc,.docx,.odt,.rtf,.ppt,.pptx,.odp,.xls,.xlsx,.ods,.txt,.log,.csv,.tsv,.jpg,.jpeg,.png,.bmp,.gif">
      
      <div class="options-panel">
        <div class="option-row">
          <input type="checkbox" id="mergeCheck" name="merge">
          <label for="mergeCheck">Merge all files into a single PDF</label>
        </div>
        <div class="option-row">
          <input type="checkbox" id="wmCheck" name="watermark_check">
          <label for="wmCheck">Add text watermark</label>
          <input type="text" id="wmText" name="watermark" placeholder="e.g. CONFIDENTIAL">
        </div>
      </div>

      <div class="file-list" id="fileList"></div>
      <button type="submit" class="btn" id="convertBtn" disabled>
        Convert to PDF
      </button>
      <div class="status" id="status"></div>
    </form>
    <div class="supported">
      Supported: DOC · DOCX · PPT · PPTX · XLS · XLSX · TXT · CSV · JPG · PNG
    </div>
  </div>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileList = document.getElementById('fileList');
const convertBtn = document.getElementById('convertBtn');
const status = document.getElementById('status');
const form = document.getElementById('form');

const wmCheck = document.getElementById('wmCheck');
const wmText = document.getElementById('wmText');
const mergeCheck = document.getElementById('mergeCheck');

let selectedFiles = [];
const ALLOWED = ['.doc','.docx','.odt','.rtf','.ppt','.pptx','.odp','.xls','.xlsx','.ods','.txt','.log','.csv','.tsv','.jpg','.jpeg','.png','.bmp','.gif'];

wmCheck.addEventListener('change', () => {
  wmText.classList.toggle('show', wmCheck.checked);
});

function isAllowed(name) {
  return ALLOWED.includes(name.slice(name.lastIndexOf('.')).toLowerCase());
}

function renderFiles() {
  fileList.innerHTML = '';
  selectedFiles.forEach((f, i) => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `
      <span class="name">📎 ${f.name}</span>
      <span class="badge ${isAllowed(f.name) ? 'pending' : 'error'}">
        ${isAllowed(f.name) ? 'Ready' : 'Unsupported'}
      </span>
      <button type="button" data-i="${i}" style="background:none;border:none;color:#94a3b8;cursor:pointer;margin-left:10px;">✕</button>
    `;
    fileList.appendChild(item);
  });
  convertBtn.disabled = selectedFiles.length === 0 || !selectedFiles.every(f => isAllowed(f.name));
}

fileList.addEventListener('click', (e) => {
  if (e.target.tagName === 'BUTTON') {
    selectedFiles.splice(parseInt(e.target.dataset.i), 1);
    renderFiles();
  }
});

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => {
  selectedFiles = selectedFiles.concat(Array.from(fileInput.files));
  fileInput.value = '';
  renderFiles();
});

['dragenter','dragover'].forEach(ev => {
  dropZone.addEventListener(ev, (e) => {
    e.preventDefault(); e.stopPropagation();
    dropZone.classList.add('dragover');
  });
});
['dragleave','drop'].forEach(ev => {
  dropZone.addEventListener(ev, (e) => {
    e.preventDefault(); e.stopPropagation();
    dropZone.classList.remove('dragover');
  });
});
dropZone.addEventListener('drop', (e) => {
  selectedFiles = selectedFiles.concat(Array.from(e.dataTransfer.files));
  renderFiles();
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  if (selectedFiles.length === 0) return;
  convertBtn.disabled = true;
  convertBtn.innerHTML = '<span class="spinner"></span> Converting...';
  status.textContent = '';

  const fd = new FormData();
  selectedFiles.forEach(f => fd.append('files', f));
  
  // Append options
  if (mergeCheck.checked) fd.append('merge', 'true');
  if (wmCheck.checked && wmText.value.trim() !== '') {
      fd.append('watermark', wmText.value.trim());
  }

  try {
    const res = await fetch('/convert', { method: 'POST', body: fd });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ error: 'Conversion failed' }));
      throw new Error(err.error || 'Server error');
    }
    const blob = await res.blob();
    const disposition = res.headers.get('Content-Disposition') || '';
    const match = disposition.match(/filename="?([^"]+)"?/);
    const filename = match ? match[1] : 'converted.zip';
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); a.remove();
    URL.revokeObjectURL(url);
    status.innerHTML = '<span style="color:#10b981;">✓ Conversion complete!</span>';
  } catch (err) {
    status.innerHTML = `<span style="color:#ef4444;">✗ ${err.message}</span>`;
  } finally {
    convertBtn.disabled = false;
    convertBtn.textContent = 'Convert to PDF';
  }
});
</script>
</body>
</html>
